name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aceitunas_v2
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: |
          npx pg-isready -h localhost -p 5432
          PGPASSWORD=postgres psql -h localhost -U postgres -d aceitunas_v2 -f database/definitiva.sql
        env:
          PGPASSWORD: postgres

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/aceitunas_v2
          SESSION_SECRET: test-secret-for-ci-pipeline
          NODE_ENV: test
          CORS_ORIGIN: '*'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: |
          if command -v prettier &> /dev/null; then
            npx prettier --check "**/*.{js,json,md}" 2>/dev/null || echo "prettier not configured"
          else
            echo "Skipping prettier (not installed)"
          fi

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t aceitunas_v2:${{ github.sha }} .

      - name: Run container health check
        run: |
          docker run -d --name test-app -e DATABASE_URL=postgres://postgres:postgres@localhost:5432/aceitunas_v2 aceitunas_v2:${{ github.sha }}
          sleep 5
          docker logs test-app
          docker stop test-app
